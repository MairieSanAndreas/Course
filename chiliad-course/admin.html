<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Espace organisation — Mairie de San Andréas</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0E0E11">
<link rel="stylesheet" href="assets/style.css">
<link rel="stylesheet" href="assets/admin.css">
</head>
<body>

<!-- =====================================================================
     CONNEXION
     ===================================================================== -->
<div class="connexion" id="ecran-connexion" hidden>
  <div class="connexion-carte">
    <div class="connexion-logo">
      <img src="assets/logo-msa.png" alt="" onerror="this.remove()">
      <div class="connexion-titre">Mairie de San Andréas</div>
      <div class="connexion-sous">Espace organisation</div>
    </div>

    <div class="champ">
      <label for="c-email">Identifiant</label>
      <input type="email" id="c-email" autocomplete="username" placeholder="prenom@mairiesanandreas.fr">
    </div>

    <div class="champ">
      <label for="c-mdp">Mot de passe</label>
      <input type="password" id="c-mdp" autocomplete="current-password">
    </div>

    <p class="erreur-champ" id="c-erreur" style="margin-bottom:12px" hidden></p>

    <button class="btn btn-or btn-large" id="btn-connexion">Se connecter</button>

    <p style="text-align:center;margin-top:24px">
      <a href="index.html" style="font-size:12px;color:var(--texte-3)">← Retour au site public</a>
    </p>
  </div>
</div>

<!-- =====================================================================
     PANEL
     ===================================================================== -->
<div class="app" id="app" hidden>

  <!-- Navigation -->
  <aside class="cote">
    <div class="cote-tete">
      <div class="titre-msa">San Andréas</div>
      <p>Caisses à savon</p>
    </div>

    <nav class="cote-nav" id="nav">
      <button class="nav-item" data-vue="bord" aria-current="true">Tableau de bord</button>

      <div class="nav-titre">Événement</div>
      <button class="nav-item" data-vue="inscriptions">Inscriptions <span class="compteur" id="n-inscriptions">0</span></button>
      <button class="nav-item" data-vue="courses">Courses <span class="compteur" id="n-courses">0</span></button>
      <button class="nav-item" data-vue="participants">Participants <span class="compteur" id="n-participants">0</span></button>

      <div class="nav-titre">Course</div>
      <button class="nav-item" data-vue="resultats">Résultats</button>
      <button class="nav-item" data-vue="classements">Classements</button>

      <div class="nav-titre">Suivi</div>
      <button class="nav-item" data-vue="historique">Historique</button>
      <button class="nav-item" data-vue="parametres" id="nav-parametres">Paramètres</button>
    </nav>

    <div class="cote-pied">
      <div class="compte">
        <div class="compte-jeton" id="compte-jeton">?</div>
        <div style="min-width:0">
          <div class="compte-nom" id="compte-nom">—</div>
          <div class="compte-role" id="compte-role">—</div>
        </div>
      </div>
      <button class="btn btn-mini" id="btn-deconnexion" style="width:100%">Se déconnecter</button>
    </div>
  </aside>

  <!-- Contenu -->
  <main class="principal">
    <div class="barre">
      <h1 id="titre-vue">Tableau de bord</h1>
      <span class="direct pousse" id="temoin-direct">Hors ligne</span>
      <a href="live.html" target="_blank" rel="noopener" class="btn btn-mini">Écran géant ↗</a>
      <a href="index.html" target="_blank" rel="noopener" class="btn btn-mini">Site public ↗</a>
    </div>

    <div class="contenu" id="vue">
      <div class="chargement"><span class="spin"></span> Chargement</div>
    </div>
  </main>

</div>

<script type="module" src="assets/admin.js"></script>
</body>
</html>
