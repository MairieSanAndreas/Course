<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Écran géant — Course de Caisses à Savon du Mont Chiliad</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="assets/style.css">
<style>
/* =====================================================================
   ÉCRAN GÉANT
   Page séparée du site public : pas de menu, pas de pied de page,
   rien à cliquer. Tout est dimensionné en vw/vh pour tenir l'écran
   quelle que soit sa taille, et lisible à quinze mètres.
   ===================================================================== */

body { overflow: hidden; height: 100vh; }

.live {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
  padding: 1.6vh 2vw;
  gap: 1.6vh;
}

.live-entete {
  display: flex;
  align-items: center;
  gap: 1.4vw;
  padding-bottom: 1.4vh;
  border-bottom: 1px solid var(--trait);
}

.live-entete img { height: 4.4vh; }

.live-marque {
  font-family: var(--f-titre);
  font-size: 1.5vh;
  font-weight: 700;
  letter-spacing: 0.3em;
  color: var(--or-sombre);
  text-transform: uppercase;
}

.live-event {
  font-family: var(--f-titre);
  font-size: 2.5vh;
  font-weight: 900;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.live-horloge {
  margin-left: auto;
  font-family: var(--f-chrono);
  font-size: 3vh;
  font-weight: 800;
  color: var(--or);
  font-variant-numeric: tabular-nums;
}

.live-corps { display: grid; grid-template-columns: 1fr 26vw; gap: 2vw; min-height: 0; }

/* --- Colonne principale --------------------------------------------- */

.live-scene { display: flex; flex-direction: column; min-height: 0; }

.live-titre-course {
  display: flex;
  align-items: baseline;
  gap: 1.4vw;
  margin-bottom: 1.6vh;
  flex-wrap: wrap;
}

.live-nom {
  font-family: var(--f-titre);
  font-size: 4.2vh;
  font-weight: 900;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  line-height: 1;
}

.live-pastille {
  display: inline-flex;
  align-items: center;
  gap: 0.7vh;
  padding: 0.6vh 1.4vh;
  border-radius: 100px;
  font-size: 1.5vh;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  border: 2px solid;
}
.live-pastille::before {
  content: '';
  width: 1.1vh; height: 1.1vh;
  border-radius: 50%;
  background: currentColor;
}
.live-pastille.en_cours  { color: var(--s-encours);   border-color: var(--s-encours);   background: color-mix(in srgb, var(--s-encours) 14%, transparent); }
.live-pastille.en_cours::before { animation: pouls 1.6s ease-in-out infinite; }
.live-pastille.prochaine { color: var(--s-prochaine); border-color: var(--s-prochaine); background: color-mix(in srgb, var(--s-prochaine) 14%, transparent); }
.live-pastille.terminee  { color: var(--s-terminee);  border-color: var(--s-terminee);  background: color-mix(in srgb, var(--s-terminee) 14%, transparent); }
.live-pastille.a_venir   { color: var(--s-avenir);    border-color: var(--s-avenir); }

.live-heure {
  font-family: var(--f-chrono);
  font-size: 2.6vh;
  font-weight: 800;
  color: var(--or);
  margin-left: auto;
}

/* --- Grille / classement -------------------------------------------- */

.live-liste { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 0.7vh; }

.live-ligne {
  display: grid;
  grid-template-columns: 7vh 8vh 1fr auto;
  align-items: center;
  gap: 1.4vw;
  padding: 1.1vh 1.6vh;
  background: var(--noir-2);
  border: 1px solid var(--trait);
  border-left: 5px solid var(--trait-2);
  border-radius: var(--r-m);
  will-change: transform;
}
.live-ligne.glisse { transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1); }

.live-ligne.rang-1 {
  border-left-color: var(--or);
  background: linear-gradient(90deg, color-mix(in srgb, var(--or) 16%, var(--noir-2)), var(--noir-2) 55%);
}
.live-ligne.rang-2 { border-left-color: #A8A8B4; }
.live-ligne.rang-3 { border-left-color: #A9743F; }
.live-ligne.est-abandon { opacity: 0.42; border-left-color: var(--danger); }

.live-pos {
  font-family: var(--f-chrono);
  font-size: 3.4vh;
  font-weight: 800;
  color: var(--texte-3);
  text-align: center;
}
.live-ligne.rang-1 .live-pos { color: var(--or); }
.live-ligne.rang-2 .live-pos, .live-ligne.rang-3 .live-pos { color: var(--texte); }

.live-dossard {
  display: grid;
  place-items: center;
  height: 4vh;
  border: 1px solid var(--trait-2);
  border-radius: var(--r-s);
  background: var(--noir-0);
  font-family: var(--f-chrono);
  font-size: 1.9vh;
  font-weight: 800;
  color: var(--texte-2);
}

.live-nom-p {
  font-size: 2.8vh;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.live-ent { font-size: 1.6vh; font-weight: 600; color: var(--texte-3); text-transform: uppercase; letter-spacing: 0.1em; }

.live-temps {
  font-family: var(--f-chrono);
  font-size: 3.2vh;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  text-align: right;
}
.live-ligne.rang-1 .live-temps { color: var(--or); }

.live-ecart { font-family: var(--f-chrono); font-size: 1.5vh; color: var(--texte-3); text-align: right; }

.live-abandon { font-size: 1.9vh; font-weight: 800; letter-spacing: 0.2em; color: var(--danger); }

.live-verrou {
  display: grid;
  place-items: center;
  flex: 1;
  border: 2px dashed var(--trait);
  border-radius: var(--r-l);
  font-family: var(--f-titre);
  font-size: 2.4vh;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--texte-3);
  text-align: center;
  padding: 2vh;
}

/* --- Colonne latérale ----------------------------------------------- */

.live-cote { display: flex; flex-direction: column; gap: 1.4vh; min-height: 0; overflow: hidden; }

.live-bloc {
  background: var(--noir-2);
  border: 1px solid var(--trait);
  border-radius: var(--r-m);
  padding: 1.6vh;
}
.live-bloc.prochaine { border-color: color-mix(in srgb, var(--s-prochaine) 45%, transparent); }

.live-bloc-titre {
  font-size: 1.3vh;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--texte-3);
  margin-bottom: 1vh;
}

.live-bloc-nom {
  font-family: var(--f-titre);
  font-size: 2.4vh;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  line-height: 1.15;
}

.live-bloc-meta {
  display: flex;
  gap: 1.2vw;
  margin-top: 0.8vh;
  font-size: 1.6vh;
  font-weight: 600;
  color: var(--texte-2);
}
.live-bloc-meta .h { font-family: var(--f-chrono); color: var(--or); font-weight: 800; }

.live-suite { flex: 1; overflow: hidden; }
.live-suite-item {
  display: flex;
  align-items: baseline;
  gap: 1vh;
  padding: 0.9vh 0;
  border-bottom: 1px solid var(--trait);
  font-size: 1.7vh;
}
.live-suite-item .h { font-family: var(--f-chrono); font-weight: 800; color: var(--or); font-size: 1.6vh; }
.live-suite-item .n { flex: 1; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.live-pied {
  display: flex;
  align-items: center;
  gap: 1vh;
  font-size: 1.3vh;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--texte-3);
}

/* Écrans étroits : la colonne latérale disparaît, le classement reste. */
@media (max-aspect-ratio: 1/1) {
  .live-corps { grid-template-columns: 1fr; }
  .live-cote { display: none; }
}
</style>
</head>
<body>

<div class="live">
  <header class="live-entete">
    <img src="assets/logo-msa.png" alt="" onerror="this.remove()">
    <div>
      <div class="live-marque" id="live-marque">Mairie de San Andréas</div>
      <div class="live-event" id="live-event">Course de Caisses à Savon</div>
    </div>
    <div class="live-horloge" id="live-horloge">--:--:--</div>
  </header>

  <div class="live-corps">
    <section class="live-scene" id="live-scene">
      <div class="chargement"><span class="spin"></span> Connexion</div>
    </section>

    <aside class="live-cote" id="live-cote"></aside>
  </div>
</div>

<script type="module" src="assets/live.js"></script>
</body>
</html>
