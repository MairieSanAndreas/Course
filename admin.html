<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Espace organisation — Mairie de San Andréas</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0E0E11">
<link rel="stylesheet" href="assets/style.css">
<link rel="stylesheet" href="assets/admin.css">
</head>
<body>

<!-- =====================================================================
     CONNEXION
     ===================================================================== -->
<div class="connexion" id="ecran-connexion" hidden>
  <div class="connexion-carte">
    <div class="connexion-logo">
      <img src="assets/logo-msa.png" alt="" onerror="this.remove()">
      <div class="connexion-titre">Mairie de San Andréas</div>
      <div class="connexion-sous">Espace organisation</div>
    </div>

    <div class="champ">
      <label for="c-email">Identifiant</label>
      <input type="email" id="c-email" autocomplete="username" placeholder="prenom@mairiesanandreas.fr">
    </div>

    <div class="champ">
      <label for="c-mdp">Mot de passe</label>
      <input type="password" id="c-mdp" autocomplete="current-password">
    </div>

    <p class="erreur-champ" id="c-erreur" style="margin-bottom:12px" hidden></p>

    <button class="btn btn-or btn-large" id="btn-connexion">Se connecter</button>

    <p style="text-align:center;margin-top:24px">
      <a href="index.html" style="font-size:12px;color:var(--texte-3)">← Retour au site public</a>
    </p>
  </div>
</div>

<!-- =====================================================================
     PANEL
     ===================================================================== -->
<div class="app" id="app" hidden>

  <!-- Navigation -->
  <aside class="cote">
    <div class="cote-tete">
      <div class="titre-msa">San Andréas</div>
      <p>Caisses à savon</p>
    </div>

    <nav class="cote-nav" id="nav">
      <button class="nav-item" data-vue="bord" aria-current="true">Tableau de bord</button>

      <div class="nav-titre">Événement</div>
      <button class="nav-item" data-vue="inscriptions">Inscriptions <span class="compteur" id="n-inscriptions">0</span></button>
      <button class="nav-item" data-vue="courses">Courses <span class="compteur" id="n-courses">0</span></button>
      <button class="nav-item" data-vue="participants">Participants <span class="compteur" id="n-participants">0</span></button>

      <div class="nav-titre">Course</div>
      <button class="nav-item" data-vue="resultats">Résultats</button>
      <button class="nav-item" data-vue="classements">Classements</button>

      <div class="nav-titre">Suivi</div>
      <button class="nav-item" data-vue="historique">Historique</button>
      <button class="nav-item" data-vue="parametres" id="nav-parametres">Paramètres</button>
    </nav>

    <div class="cote-pied">
      <div class="compte">
        <div class="compte-jeton" id="compte-jeton">?</div>
        <div style="min-width:0">
          <div class="compte-nom" id="compte-nom">—</div>
          <div class="compte-role" id="compte-role">—</div>
        </div>
      </div>
      <button class="btn btn-mini" id="btn-deconnexion" style="width:100%">Se déconnecter</button>
    </div>
  </aside>

  <!-- Contenu -->
  <main class="principal">
    <div class="barre">
      <h1 id="titre-vue">Tableau de bord</h1>
      <span class="direct pousse" id="temoin-direct">Hors ligne</span>
      <a href="live.html" target="_blank" rel="noopener" class="btn btn-mini">Écran géant ↗</a>
      <a href="index.html" target="_blank" rel="noopener" class="btn btn-mini">Site public ↗</a>
    </div>

    <div class="contenu" id="vue">
      <div class="chargement"><span class="spin"></span> Chargement</div>
    </div>
  </main>

</div>

<script type="module" src="assets/admin.js"></script>

<!-- =====================================================================
     FILET DE DIAGNOSTIC
     Ce script n'est PAS un module : il s'execute toujours, meme si le
     module principal echoue a se charger (fichier manquant, erreur de
     syntaxe, import casse). Sans lui, une page dont les ecrans sont
     tous « hidden » reste noire et muette.
     ===================================================================== -->
<script>
(function () {
  var vu = [];

  function afficher(titre, detail) {
    if (document.getElementById('filet-erreur')) return;
    var d = document.createElement('div');
    d.id = 'filet-erreur';
    d.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#0E0E11;'
      + 'color:#E9E7E3;font:14px/1.6 system-ui,sans-serif;padding:32px;overflow:auto';
    d.innerHTML = '<div style="max-width:640px;margin:8vh auto">'
      + '<div style="color:#D4AF37;font-weight:700;letter-spacing:.2em;'
      + 'text-transform:uppercase;font-size:12px;margin-bottom:16px">Mairie de San Andréas</div>'
      + '<h1 style="font-size:20px;margin-bottom:12px">' + titre + '</h1>'
      + '<p style="color:#9C9BA5;margin-bottom:20px">La page n\'a pas pu démarrer. '
      + 'Le détail ci-dessous indique quoi corriger.</p>'
      + '<pre style="background:#08080A;border:1px solid #2A2A33;border-radius:6px;'
      + 'padding:16px;font-size:12px;color:#F87171;white-space:pre-wrap;'
      + 'word-break:break-all">' + detail + '</pre>'
      + '<p style="color:#66656F;font-size:12px;margin-top:20px">'
      + 'Causes fréquentes : un fichier de assets/ absent ou mal nommé (la casse '
      + 'compte sur GitHub Pages), ou config.js incomplet.</p></div>';
    document.body.appendChild(d);
  }

  // Erreurs de chargement de <script> et de ressources
  window.addEventListener('error', function (e) {
    if (e.target && e.target.tagName === 'SCRIPT') {
      vu.push('Fichier introuvable ou illisible : ' + (e.target.src || '?'));
      afficher('Un fichier manque', vu.join('\n'));
    } else if (e.message) {
      vu.push(e.message + (e.filename ? '\n  ' + e.filename + ':' + e.lineno : ''));
    }
  }, true);

  window.addEventListener('unhandledrejection', function (e) {
    vu.push('Promesse rejetée : ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });

  // Filet final : si rien n'est visible au bout de 5 s, on parle.
  setTimeout(function () {
    if (document.getElementById('filet-erreur')) return;
    var visible = Array.prototype.some.call(
      document.querySelectorAll('main, .app, .connexion, .live'),
      function (el) { return el.offsetParent !== null; });
    if (!visible) {
      afficher('La page n\'a pas démarré',
        vu.length ? vu.join('\n') : 'Aucune erreur JavaScript remontée.\n\n'
        + 'Ouvre la console (F12) pour le détail, et vérifie que tous les\n'
        + 'fichiers de assets/ sont bien en ligne — notamment decharge.js.');
    }
  }, 5000);
})();
</script>

</body>
</html>
